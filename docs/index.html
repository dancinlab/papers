const searchEl = document.getElementById('search');
const repoEl = document.getElementById('repoFilter');
const statusEl = document.getElementById('statusFilter');
const tierEl = document.getElementById('tierFilter');
const listEl = document.getElementById('paperList');
const countEl = document.getElementById('countDisplay');

function render() {
  const q = searchEl.value.toLowerCase();
  const repo = repoEl.value;
  const status = statusEl.value;
  const tier = tierEl.value;

  const filtered = papers.filter(p => {
    if (q && !p.title.toLowerCase().includes(q) && !p.id.toLowerCase().includes(q) && !p.desc.toLowerCase().includes(q)) return false;
    if (repo !== 'all' && p.repo !== repo) return false;
    if (status !== 'all' && p.status !== status) return false;
    if (tier !== 'all' && p.tier !== parseInt(tier)) return false;
    return true;
  });

  countEl.textContent = `Showing ${filtered.length} of ${papers.length} papers`;

  listEl.innerHTML = filtered.map(p => {
    const statusClass = p.status === 'Published' ? 'badge-published' : 'badge-draft';
    const tierClass = p.tier === 1 ? 'badge-tier1' : p.tier === 2 ? 'badge-tier2' : 'badge-tier3';
    const doiHtml = p.doi ? `<a class="doi-link" href="https://doi.org/${p.doi}" target="_blank">${p.doi}</a>` : '';
    const ghBase = 'https://github.com/need-singularity/papers/blob/main/';

    return `<div class="paper">
      <div class="paper-header">
        <div>
          <div class="paper-title"><a href="${ghBase}${p.file}" target="_blank">${p.title}</a></div>
          <div class="paper-meta">
            <span class="paper-id">${p.id}</span>
            <span class="badge badge-repo">${p.repo}</span>
            <span class="badge ${statusClass}">${p.status}</span>
            <span class="badge ${tierClass}">Tier ${p.tier}</span>
            ${doiHtml}
          </div>
          <div class="paper-desc">${p.desc}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

searchEl.addEventListener('input', render);
repoEl.addEventListener('change', render);
statusEl.addEventListener('change', render);
tierEl.addEventListener('change', render);
render();
</script>
